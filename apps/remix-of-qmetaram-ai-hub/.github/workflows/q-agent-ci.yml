name: q-agent-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/remix-of-qmetaram-ai-hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/remix-of-qmetaram-ai-hub/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - if: github.ref == 'refs/heads/main'
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}